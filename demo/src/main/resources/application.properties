# JDBC datasource configuration (H2 in-memory example)
# If you want to use an embedded database, add the corresponding dependency
# to pom.xml (e.g. org.h2:h2). Spring Boot will then auto-configure it.
#
# Uncomment and adjust the following properties when using a real database:
# spring.datasource.url=jdbc:mysql://localhost:3306/mydb
# spring.datasource.username=user
# spring.datasource.password=secret
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 configuration (works out of the box if H2 driver is on the classpath)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate settings (optional)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

